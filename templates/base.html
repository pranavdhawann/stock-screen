<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Screen - Real-time News & Market Intelligence{% endblock %}</title>

    <!-- SEO Meta Tags -->
    {% block seo %}
    <meta name="description" content="Stock Screen delivers real-time stock news, SEC filing analysis, and AI-powered market intelligence. Track sentiment, analyze 10-K/10-Q/8-K filings, and make informed investment decisions.">
    <meta property="og:title" content="Stock Screen - Real-time News & Market Intelligence">
    <meta property="og:description" content="AI-powered stock sentiment analysis, SEC filing summaries, and multi-source news intelligence.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Stock Screen">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Stock Screen - Real-time News & Market Intelligence">
    <meta name="twitter:description" content="AI-powered stock sentiment analysis, SEC filing summaries, and multi-source news intelligence.">
    {% endblock %}
    {% block canonical %}{% endblock %}

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Stock Screen",
        "description": "Real-time stock news, SEC filing analysis, and AI-powered market intelligence platform.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav" id="topNav">
        <div class="top-nav-inner">
            <div class="nav-brand">
                <a href="{{ url_for('main.home') }}">
                    <span class="brand-text">STOCK SCREEN</span>
                </a>
            </div>

            <div class="nav-links" id="navLinks">
                <a class="nav-link-item" href="{{ url_for('main.home') }}">
                    <i class="fas fa-newspaper"></i>
                    <span>News</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.sec_filings') }}">
                    <i class="fas fa-file-alt"></i>
                    <span>SEC Filings</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.about') }}">
                    <i class="fas fa-info-circle"></i>
                    <span>About</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.contact') }}">
                    <i class="fas fa-envelope"></i>
                    <span>Contact</span>
                </a>
            </div>

            <div class="nav-actions">
                <div class="market-location-switch">
                    <button class="market-location-btn" id="marketLocationSwitch" type="button">
                        <div class="flag-container">
                            <span class="flag flag-us" data-country="US">🇺🇸</span>
                            <span class="flag flag-in" data-country="IN">🇮🇳</span>
                        </div>
                        <div class="toggle-indicator" id="toggleIndicator"></div>
                    </button>
                </div>
            </div>

            <button class="nav-hamburger" id="navHamburger" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Back to Top -->
    <div class="back-to-top-widget" id="backToTop" title="Back to Top">
        <div class="back-to-top-toggle">
            <i class="fas fa-arrow-up"></i>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js with Date Adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
