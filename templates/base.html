<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Screen - Real-time News & Market Intelligence{% endblock %}</title>

    <!-- SEO Meta Tags -->
    {% block seo %}
    <meta name="description" content="Stock Screen delivers real-time stock news, SEC filing analysis, and AI-powered market intelligence. Track sentiment, analyze 10-K/10-Q/8-K filings, and make informed investment decisions.">
    <meta property="og:title" content="Stock Screen - Real-time News & Market Intelligence">
    <meta property="og:description" content="AI-powered stock sentiment analysis, SEC filing summaries, and multi-source news intelligence.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Stock Screen">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Stock Screen - Real-time News & Market Intelligence">
    <meta name="twitter:description" content="AI-powered stock sentiment analysis, SEC filing summaries, and multi-source news intelligence.">
    {% endblock %}
    {% block canonical %}{% endblock %}

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Stock Screen",
        "description": "Real-time stock news, SEC filing analysis, and AI-powered market intelligence platform.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav" id="topNav">
        <div class="top-nav-inner">
            <div class="nav-brand">
                <a href="{{ url_for('main.home') }}">
                    <span class="brand-text">STOCK SCREEN</span>
                </a>
            </div>

            <div class="nav-links" id="navLinks">
                <a class="nav-link-item" href="{{ url_for('main.home') }}" data-tab="main">
                    <span>Markets</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.sec_filings') }}">
                    <span>Company Filings</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.forecasting') }}">
                    <span>Forecasting</span>
                </a>
                <a class="nav-link-item" href="{{ url_for('main.about') }}">
                    <span>About</span>
                </a>
            </div>

            <div class="nav-actions">
                <div class="market-selector">
                    <select class="market-select" id="marketSelect">
                        <option value="US" selected>US Markets</option>
                        <option value="IN">India Markets</option>
                    </select>
                </div>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot" id="statusDot" title="Connected"></span>
                    <span class="status-label" id="statusLabel"></span>
                </div>
            </div>

            <button class="nav-hamburger" id="navHamburger" aria-label="Toggle navigation">
                MENU
            </button>
        </div>
    </nav>

    <!-- Back to Top -->
    <div class="back-to-top-widget" id="backToTop" title="Back to Top">
        <div class="back-to-top-toggle">
            TOP
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
        <div style="background:var(--bg-panel,#111); border:1px solid var(--border,#333); width:90%; max-width:440px; padding:0; font-family:var(--font-mono,monospace);">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border,#333);">
                <span style="font-size:0.75rem; color:var(--accent-amber,#FFA500); text-transform:uppercase; letter-spacing:0.1em;">
                    CONTACT
                </span>
                <button onclick="closeContactModal()" style="background:none; border:none; color:var(--text-muted,#666); cursor:pointer; font-size:1.1rem; padding:0; line-height:1;">&times;</button>
            </div>
            <div style="padding:24px;">
                <form id="contactModalForm">
                    <div style="margin-bottom:16px;">
                        <input type="text" id="cmName" placeholder="Name" required
                            style="width:100%; background:transparent; border:1px solid var(--border,#333); color:var(--text-primary,#e0e0e0); font-family:inherit; font-size:0.82rem; padding:10px 12px; outline:none; box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <input type="email" id="cmEmail" placeholder="Email" required
                            style="width:100%; background:transparent; border:1px solid var(--border,#333); color:var(--text-primary,#e0e0e0); font-family:inherit; font-size:0.82rem; padding:10px 12px; outline:none; box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <textarea id="cmMessage" placeholder="Message" rows="4" required
                            style="width:100%; background:transparent; border:1px solid var(--border,#333); color:var(--text-primary,#e0e0e0); font-family:inherit; font-size:0.82rem; padding:10px 12px; outline:none; resize:vertical; box-sizing:border-box;"></textarea>
                    </div>
                    <button type="submit" id="cmSubmitBtn"
                        style="width:100%; background:var(--accent-amber,#FFA500); color:#000; border:none; font-family:inherit; font-size:0.78rem; font-weight:700; padding:11px; cursor:pointer; letter-spacing:0.05em;">
                        SEND MESSAGE
                    </button>
                </form>
                <div id="cmSuccess" style="display:none; color:var(--positive,#4caf50); font-size:0.82rem; text-align:center; padding:16px 0;">
                    Message sent. We'll be in touch.
                </div>
                <div id="cmError" style="display:none; color:var(--negative,#f44336); font-size:0.78rem; text-align:center; padding:8px 0;"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>


    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js with Date Adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Contact Modal Logic -->
    <script>
    (function(){
        var modal = document.getElementById('contactModal');
        var form = document.getElementById('contactModalForm');
        var successEl = document.getElementById('cmSuccess');
        var errorEl = document.getElementById('cmError');
        var submitBtn = document.getElementById('cmSubmitBtn');
        var _ejsReady = false, _ejsCfg = null;

        // Fetch EmailJS config once
        fetch('/api/emailjs_config').then(function(r){return r.json();}).then(function(cfg){
            if(cfg.service_id && cfg.public_key){
                emailjs.init(cfg.public_key);
                _ejsCfg = cfg;
                _ejsReady = true;
            }
        }).catch(function(){});

        window.openContactModal = function(){
            form.style.display='';
            successEl.style.display='none';
            errorEl.style.display='none';
            form.reset();
            submitBtn.disabled=false;
            submitBtn.textContent='SEND MESSAGE';
            modal.style.display='flex';
        };
        window.closeContactModal = function(){
            modal.style.display='none';
        };

        // Close on backdrop click
        modal.addEventListener('click',function(e){
            if(e.target===modal) closeContactModal();
        });
        // Close on Escape
        document.addEventListener('keydown',function(e){
            if(e.key==='Escape' && modal.style.display==='flex') closeContactModal();
        });

        form.addEventListener('submit',function(e){
            e.preventDefault();
            errorEl.style.display='none';
            var name=document.getElementById('cmName').value.trim();
            var email=document.getElementById('cmEmail').value.trim();
            var message=document.getElementById('cmMessage').value.trim();
            if(!name||!email||!message){
                errorEl.textContent='All fields are required.';
                errorEl.style.display='';
                return;
            }
            if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){
                errorEl.textContent='Please enter a valid email.';
                errorEl.style.display='';
                return;
            }
            if(!_ejsReady){
                errorEl.textContent='Contact service not configured. Please try again later.';
                errorEl.style.display='';
                return;
            }
            submitBtn.disabled=true;
            submitBtn.textContent='SENDING...';
            emailjs.send(_ejsCfg.service_id, _ejsCfg.template_id, {
                from_name: name,
                from_email: email,
                message: message,
            }).then(function(){
                form.style.display='none';
                successEl.style.display='';
            },function(err){
                errorEl.textContent='Failed to send. Please try again.';
                errorEl.style.display='';
                submitBtn.disabled=false;
                submitBtn.textContent='SEND MESSAGE';
            });
        });
    })();
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
